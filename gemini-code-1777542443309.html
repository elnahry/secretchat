<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>secretchat | Mohammed Mahmoud Hassan</title>
    
    <!-- مكتبات التصميم والأيقونات العالمية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        /* 
           ===========================================================
           1. التصميم البصري (Sovereign UI Matrix)
           ===========================================================
        */
        :root {
            --primary-blue: #007aff;
            --fb-blue: #1877f2;
            --ms-color: #2f2f2f;
            --glass-bg: rgba(255, 255, 255, 0.98);
            --bg-body: #f5f5f7;
            --text-main: #1c1c1e;
            --text-secondary: #8e8e93;
            --danger: #ff3b30;
            --success: #34c759;
            --radius-max: 35px;
            --shadow-lux: 0 30px 60px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif; 
            background: var(--bg-body); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }

        .secret-container {
            width: 98vw; height: 96vh; background: var(--glass-bg);
            backdrop-filter: blur(50px); border-radius: var(--radius-max);
            display: flex; box-shadow: var(--shadow-lux);
            border: 1px solid rgba(255,255,255,0.8); position: relative;
        }

        /* 
           ===========================================================
           2. بوابة الدخول (Multi-Auth Gate)
           ===========================================================
        */
        #auth-gate {
            position: absolute; inset: 0; background: white; z-index: 200000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .auth-card { text-align: center; width: 500px; padding: 60px; border-radius: 40px; background: #fff; }
        .auth-icon-main { font-size: 5rem; color: var(--primary-blue); margin-bottom: 30px; }
        
        .auth-btn {
            width: 100%; padding: 18px; border-radius: 50px; border: none; 
            font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-google { background: #f2f2f7; color: #000; }
        .btn-fb { background: var(--fb-blue); color: #fff; }
        .btn-ms { background: var(--ms-color); color: #fff; }

        /* 
           ===========================================================
           3. القائمة الجانبية (The Navigator)
           ===========================================================
        */
        .sidebar {
            width: 440px; border-left: 1px solid rgba(0,0,0,0.06);
            display: flex; flex-direction: column; background: rgba(255,255,255,0.4);
        }
        .sidebar-header { padding: 45px 35px 20px; }
        .sidebar-header h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -2px; }

        .action-dock { display: flex; gap: 15px; margin: 25px 0; }
        .dock-btn {
            width: 60px; height: 60px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 1.6rem; color: var(--text-main); box-shadow: 0 5px 15px rgba(0,0,0,0.04);
        }
        .dock-btn:hover { background: var(--primary-blue); color: white; transform: translateY(-5px); }
        .admin-crown { background: #fff1f0; color: var(--danger); display: none; }

        .search-wrap { padding: 0 35px 30px; }
        .search-pill { background: #f1f3f4; border-radius: 20px; padding: 16px 25px; display: flex; align-items: center; gap: 15px; }
        .search-pill input { border: none; background: transparent; flex: 1; font-size: 1.1rem; }

        .chat-list-scroll { flex: 1; overflow-y: auto; padding: 0 20px; }
        .chat-tile {
            display: flex; align-items: center; padding: 22px; border-radius: 30px;
            cursor: pointer; gap: 20px; margin-bottom: 10px;
        }
        .chat-tile:hover { background: rgba(26,115,232,0.06); }
        .chat-tile.active { background: white; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }

        .avatar-main {
            width: 70px; height: 70px; border-radius: 50%; background: #3c4043;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 1.7rem; position: relative;
        }
        .online-status { position: absolute; bottom: 3px; right: 3px; width: 16px; height: 16px; background: #34c759; border: 4px solid white; border-radius: 50%; }

        /* 
           ===========================================================
           4. محرك الرؤية والدردشة (The Chat Engine)
           ===========================================================
        */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-top {
            padding: 30px 45px; border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .meet-dock { display: flex; gap: 30px; color: var(--primary-blue); font-size: 1.8rem; }
        
        #messages-stream { flex: 1; overflow-y: auto; padding: 45px; display: flex; flex-direction: column; gap: 12px; }
        
        .bubble-row { display: flex; flex-direction: column; max-width: 75%; margin-bottom: 18px; }
        .me { align-self: flex-end; }
        .others { align-self: flex-start; }

        .bubble-core {
            padding: 20px 30px; border-radius: 32px; font-size: 1.2rem; line-height: 1.6;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
        }
        .me .bubble-core { background: var(--primary-blue); color: white; border-bottom-right-radius: 6px; }
        .others .bubble-core { background: #f1f3f4; color: var(--text-main); border-bottom-left-radius: 6px; }

        .footer-input { padding: 35px 50px; display: flex; align-items: center; gap: 25px; border-top: 1px solid #f1f3f4; }
        .input-pill { background: #f1f3f4; border-radius: 40px; flex: 1; padding: 20px 35px; }
        .input-pill input { border: none; background: transparent; width: 100%; font-size: 1.3rem; }
        .send-trigger { color: var(--primary-blue); font-size: 3rem; cursor: pointer; }

        /* 
           ===========================================================
           5. لوحة التحكم الإمبراطورية (The Dashboard)
           ===========================================================
        */
        #master-dash {
            display: none; position: fixed; inset: 0; background: #fff;
            z-index: 250000; flex-direction: column; padding: 80px; overflow-y: auto;
        }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 70px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; }
        .stat-card { background: #f8f9fa; padding: 60px; border-radius: 50px; text-align: center; }
        .stat-card h2 { font-size: 5rem; color: var(--primary-blue); }

        /* مودال الإنشاء */
        .modal-full {
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98);
            backdrop-filter: blur(30px); z-index: 195000; justify-content: center; align-items: center;
        }
        .modal-inner {
            background: white; width: 650px; padding: 70px; border-radius: 50px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.1); border: 1px solid #eee;
        }

    </style>
</head>
<body>

    <!-- بوابة الدخول المتعددة -->
    <div id="auth-gate">
        <div class="auth-card">
            <div class="auth-icon-main"><i class="fas fa-user-secret"></i></div>
            <h1 style="font-weight: 900; font-size: 3.5rem; margin-bottom: 10px;">secretchat</h1>
            <p style="color: var(--text-secondary); font-weight: 700; margin-bottom: 45px;">Sovereign V27 | محمد محمود حسن</p>
            <button class="auth-btn btn-google" onclick="Secret.auth('google')"><i class="fab fa-google"></i> المتابعة بجوجل</button>
            <button class="auth-btn btn-fb" onclick="Secret.auth('facebook')"><i class="fab fa-facebook-f"></i> المتابعة بفيسبوك</button>
            <button class="auth-btn btn-ms" onclick="Secret.auth('microsoft')"><i class="fab fa-microsoft"></i> المتابعة بمايكروسوفت</button>
        </div>
    </div>

    <!-- الهيكل الرئيسي -->
    <div class="secret-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>الدردشات</h1>
                <div class="action-dock">
                    <div class="dock-btn admin-crown" id="btn-dash" onclick="Secret.toggleDash()"><i class="fas fa-crown"></i></div>
                    <div class="dock-btn admin-crown" id="btn-add" onclick="Secret.openCreator()"><i class="fas fa-plus"></i></div>
                    <div class="dock-btn" onclick="Secret.toast('تشفير V27 نشط ✅', 'info')"><i class="fas fa-fingerprint"></i></div>
                </div>
            </div>
            <div class="search-wrap">
                <div class="search-pill">
                    <i class="fas fa-search" style="color: #bbb;"></i>
                    <input type="text" placeholder="البحث في السجلات...">
                </div>
            </div>
            <div class="chat-list-scroll" id="rooms-feed-list"></div>
        </aside>

        <main class="chat-view">
            <header class="chat-top">
                <div style="display:flex; align-items:center; gap:30px;">
                    <div class="avatar-main" id="header-avatar">?</div>
                    <div>
                        <h3 id="header-name" style="font-weight: 900; font-size: 1.7rem;">الدردشة العامة</h3>
                        <span style="color: #34c759; font-size: 1rem; font-weight: 800;">تكامل Google Meet مفعل</span>
                    </div>
                </div>
                <div class="meet-dock">
                    <i class="fas fa-video" onclick="Secret.openMeet()" title="بدء Google Meet"></i>
                    <i class="fas fa-phone-alt" onclick="Secret.openMeet()" title="مكالمة Meet"></i>
                    <i class="fas fa-shield-halved"></i>
                </div>
            </header>

            <div id="messages-stream"></div>

            <footer class="footer-input">
                <div style="display:flex; gap:30px; font-size:2rem; color:var(--primary-blue);">
                    <i class="fas fa-plus-circle"></i>
                    <label style="cursor:pointer"><i class="fas fa-image"></i><input type="file" id="media-up" style="display:none" onchange="Secret.handleUpload()"></label>
                    <i class="fas fa-location-dot" onclick="Secret.shareGPS()"></i>
                </div>
                <div class="input-pill">
                    <input type="text" id="main-in" placeholder="Aa" autocomplete="off">
                </div>
                <div class="send-trigger" id="btn-send-ui" onclick="Secret.send()">
                    <i class="fas fa-thumbs-up"></i>
                </div>
            </footer>
        </main>
    </div>

    <!-- لوحة التحكم الإمبراطورية -->
    <div id="master-dash">
        <div class="dash-header">
            <h1>إحصائيات secretchat 💎</h1>
            <button class="auth-btn btn-google" style="width:auto; padding:15px 50px;" onclick="Secret.toggleDash()">إغلاق</button>
        </div>
        <div class="stat-grid">
            <div class="stat-card"><h2 id="st-users">...</h2><p>مستخدم مسجل</p></div>
            <div class="stat-card"><h2 id="st-rooms">...</h2><p>محادثة مشفرة</p></div>
            <div class="stat-card"><h2>V27</h2><p>إصدار محمد حسن</p></div>
        </div>
        <div id="admin-user-list" style="margin-top:70px; background:white; padding:40px; border-radius:40px;"></div>
    </div>

    <!-- مودال الإنشاء -->
    <div id="creator-modal" class="modal-full">
        <div class="modal-inner">
            <h2 style="font-size:2.5rem; font-weight:900;">بدء دردشة خاصة / جروب 🔒</h2>
            <input type="text" id="room-name-in" placeholder="اسم المحادثة..." style="width:100%; padding:25px; border-radius:25px; border:1px solid #ddd; margin-top:40px;">
            <div style="max-height:350px; overflow-y:auto; margin:40px 0; border:1px solid #eee; border-radius:30px;" id="user-selection-list"></div>
            <button class="auth-btn btn-google" style="background:#000; color:#fff;" onclick="Secret.confirmCreate()">إطلاق المحادثة</button>
            <button onclick="Secret.closeCreator()" style="width:100%; border:none; background:none; margin-top:20px; color:var(--danger); font-weight:bold; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <script>
        /**
         * ===========================================================
         * المحرك الرئيسي السيادي (The Secret Sovereign Engine V27)
         * ===========================================================
         */

        const Secret = {
            config: {
                apiKey: "AIzaSyCdd-dYVDerGIBgSoxe0IB_R5QQtQG9iCI",
                authDomain: "my-chat-f64f1.firebaseapp.com",
                projectId: "my-chat-f64f1",
                storageBucket: "my-chat-f64f1.firebasestorage.app",
                appId: "1:269247632172:web:72196d493ca90139435289"
            },
            // تأكيد هوية محمد محمود حسن كمدير
            MASTER_EMAIL: "gamemoon21978@gmail.com",
            G_APPS_SCRIPT: "https://script.google.com/macros/s/AKfycbzzffkASTDTpkASVq-eQh6AJ5lUykWdj270tWbYld_KSBBT7l0Eoj8ja45_5S2MEmZljw/exec",
            
            user: null, room: 'public', stream: {},

            init() {
                firebase.initializeApp(this.config);
                this.db = firebase.firestore();
                this.auth_sys = firebase.auth();
                this.listenAuth();
                this.bindUI();
            },

            listenAuth() {
                this.auth_sys.onAuthStateChanged(async u => {
                    if(u) {
                        this.user = u;
                        document.getElementById('auth-gate').style.display = 'none';
                        await this.db.collection('final_users_db').doc(u.email).set({
                            name: u.displayName, email: u.email, photo: u.photoURL, lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                        }, {merge: true});

                        if(u.email === this.MASTER_EMAIL) {
                            document.querySelectorAll('.admin-crown').forEach(b => b.style.display = 'flex');
                        }

                        this.syncRooms();
                        this.switchRoom('public', 'الدردشة العامة 🌍');
                        this.toast(`مرحباً بك يا محمد في secretchat V27 💎`, 'success');
                    }
                });
            },

            auth(provider) {
                let p;
                if(provider === 'google') p = new firebase.auth.GoogleAuthProvider();
                else if(provider === 'facebook') p = new firebase.auth.FacebookAuthProvider();
                else if(provider === 'microsoft') p = new firebase.auth.OAuthProvider('microsoft.com');
                this.auth_sys.signInWithPopup(p);
            },

            toast(msg, type) {
                const t = document.createElement('div');
                t.style = "position:fixed; top:50px; left:50%; transform:translateX(-50%); padding:20px 45px; background:white; color:black; border-radius:50px; font-weight:900; box-shadow:0 20px 40px rgba(0,0,0,0.1); z-index:300000; border-right:10px solid #1a73e8;";
                t.innerHTML = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 4500);
            },

            syncRooms() {
                this.db.collection('final_rooms_db').where('members', 'array-contains', this.user.email).onSnapshot(snap => {
                    const list = document.getElementById('rooms-feed-list');
                    list.innerHTML = `<div class="chat-tile ${this.room==='public'?'active':''}" onclick="Secret.switchRoom('public', 'الدردشة العامة 🌍')"><div class="avatar-main" style="background:var(--primary-blue)">🌍<div class="online-status"></div></div><div style="flex:1"><h4 style="font-weight:900;">الدردشة العامة</h4><p style="font-size:1rem; color:#5f6368;">مفتوحة للجميع...</p></div></div>`;
                    snap.forEach(doc => {
                        const r = doc.data();
                        list.innerHTML += `<div class="chat-tile ${this.room===doc.id?'active':''}" onclick="Secret.switchRoom('${doc.id}', '${r.name}')"><div class="avatar-main" style="background:#5f6368">${r.name[0]}<div class="online-status"></div></div><div style="flex:1"><h4 style="font-weight:900;">${r.name} 🔒</h4><p style="font-size:1rem; color:#5f6368;">محادثة سيادية مشفرة</p></div></div>`;
                    });
                });
            },

            switchRoom(id, name) {
                this.room = id;
                document.getElementById('header-name').innerText = name;
                document.getElementById('header-avatar').innerText = name.includes('🌍') ? '🌍' : name[0];
                this.syncMessages();
            },

            async send() {
                const input = document.getElementById('main-in');
                const val = input.value.trim() || '👍';
                await this.db.collection('final_msgs_db').add({
                    roomId: this.room, sender: this.user.displayName, email: this.user.email,
                    text: val, type: 'text', time: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = "";
                input.dispatchEvent(new Event('input'));
            },

            syncMessages() {
                if(this.stream.msgs) this.stream.msgs();
                this.stream.msgs = this.db.collection('final_msgs_db').where('roomId', '==', this.room).orderBy('time').onSnapshot(snap => {
                    const stream = document.getElementById('messages-stream');
                    stream.innerHTML = `<div style="text-align:center; color:#ccc; font-size:1rem; margin-bottom:50px; font-weight:bold;">🛡️ نظام الرؤية السيادي: E2EE مفعل (V27)</div>`;
                    snap.forEach(doc => {
                        const m = doc.data();
                        const me = m.email === this.user.email;
                        const time = m.time ? new Date(m.time.toDate()).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) : 'الآن';
                        stream.innerHTML += `<div class="bubble-row ${me ? 'me' : 'others'}"><div class="bubble-core" style="${m.text==='👍'?'background:none; box-shadow:none; font-size:6rem; padding:0;':''}">${m.type==='text'?m.text:(m.type==='file'?(m.fileType.startsWith('image/')?`<img src="${m.fileUrl}" style="max-width:400px; border-radius:30px;">`:`📁 ملف: ${m.fileName}`):`<a href="${m.locUrl}" target="_blank" style="color:inherit; font-weight:900;">📍 الموقع</a>`)}${m.text!=='👍'?`<span style="font-size:0.8rem; display:block; margin-top:8px; ${me?'color:#e8f0fe;':'color:#5f6368;'}">${time}</span>`:''}</div></div>`;
                    });
                    stream.scrollTop = stream.scrollHeight;
                });
            },

            openMeet() { window.open("https://meet.google.com/new", "_blank"); },

            toggleDash() {
                const b = document.getElementById('master-dash');
                b.style.display = b.style.display === 'flex' ? 'none' : 'flex';
                this.db.collection('final_users_db').get().then(s => {
                    document.getElementById('st-users').innerText = s.size;
                    const list = document.getElementById('admin-user-list');
                    list.innerHTML = `<h3 style="margin-bottom:20px;">سجل المستخدمين والإيميلات</h3>`;
                    s.forEach(doc => {
                        const ud = doc.data();
                        list.innerHTML += `<div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; font-weight:bold;"><span>${ud.name}</span> <span style="color:var(--primary-blue);">${ud.email}</span></div>`;
                    });
                });
                this.db.collection('final_rooms_db').get().then(s => document.getElementById('st-rooms').innerText = s.size);
            },

            openCreator() {
                document.getElementById('creator-modal').style.display = 'flex';
                this.db.collection('final_users_db').get().then(snap => {
                    const list = document.getElementById('user-selection-list');
                    list.innerHTML = "";
                    snap.forEach(doc => {
                        const u = doc.data();
                        if(u.email !== this.user.email) list.innerHTML += `<label style="display:flex; align-items:center; padding:25px; gap:25px; border-bottom:1px solid #f9f9f9; cursor:pointer;"><input type="checkbox" value="${u.email}" class="u-check" style="width:30px; height:30px;"> <b>${u.name}</b></label>`;
                    });
                });
            },

            closeCreator() { document.getElementById('creator-modal').style.display = 'none'; },

            async confirmCreate() {
                const name = document.getElementById('room-name-in').value;
                const checks = document.querySelectorAll('.u-check:checked');
                let members = [this.user.email];
                checks.forEach(c => members.push(c.value));
                if(!name || members.length < 2) return alert("أكمل البيانات!");
                await this.db.collection('final_rooms_db').add({ name, members, time: firebase.firestore.FieldValue.serverTimestamp() });
                this.closeCreator();
            },

            async handleUpload() {
                const file = document.getElementById('media-up').files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    this.toast("جاري التشفير والرفع لـ Google Drive... ⏳", "info");
                    try {
                        const res = await fetch(this.G_APPS_SCRIPT, { method: 'POST', headers: {"Content-Type": "text/plain;charset=utf-8"}, body: JSON.stringify({fileData: e.target.result, fileName: file.name, fileType: file.type})});
                        const data = await res.json();
                        if(data.status === 'success') {
                            await this.db.collection('final_msgs_db').add({
                                roomId: this.room, sender: this.user.displayName, email: this.user.email,
                                fileUrl: data.url, fileName: file.name, fileType: file.type, type: 'file', time: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            this.toast("تم الرفع بنجاح ✅", "success");
                        }
                    } catch(e) { this.toast("خطأ في الرفع!", "error"); }
                };
                reader.readAsDataURL(file);
            },

            shareGPS() {
                navigator.geolocation.getCurrentPosition(async p => {
                    await this.db.collection('final_msgs_db').add({
                        roomId: this.room, sender: this.user.displayName, email: this.user.email,
                        locUrl: `https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`, type: 'loc', time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
            },

            bindUI() {
                const input = document.getElementById('main-in');
                const btn = document.getElementById('btn-send-ui');
                input.addEventListener('input', () => { btn.innerHTML = input.value.trim() ? '<i class="fas fa-paper-plane"></i>' : '<i class="fas fa-thumbs-up"></i>'; });
                input.onkeypress = (e) => { if(e.key === 'Enter') this.send(); };
            }
        };

        Secret.init();
    </script>
</body>
</html>
